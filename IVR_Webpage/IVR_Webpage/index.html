<!doctype html>
<html lang="en">
  <head>
    <script>
      // Redirect to the compiled /docs/ folder if we are running in production on GitHub Pages
      if (window.location.hostname.includes('github.io')) {
        const docsPath = window.location.pathname.endsWith('/') 
          ? window.location.pathname + 'docs/' 
          : window.location.pathname + '/docs/';
        window.location.replace(docsPath);
      } else {
        window.location.replace('/dev.html');
      }
    </script>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="navabharath_logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Navabharath Technologies | Advanced IVR Systems</title>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
