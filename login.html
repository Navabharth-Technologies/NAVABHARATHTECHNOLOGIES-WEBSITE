<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Navabharath Technologies</title>
    <!-- Favicons - Optimized for Search Engines -->
    <!-- favicon.ico for Google Search compatibility -->
    <link rel="icon" href="favicon.ico" sizes="any">
    <link rel="shortcut icon" href="favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png?v=4">
    <link rel="icon" type="image/png" sizes="192x192" href="android-chrome-192x192.png?v=4">
    <link rel="icon" type="image/png" sizes="512x512" href="android-chrome-512x512.png?v=4">
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png?v=4">
    <link rel="shortcut icon" href="favicon.ico?v=4">
    <link rel="manifest" href="site.webmanifest?v=4">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { 
            background: #f8fafc;
            /* Subtle clean pattern background */
            background-image: radial-gradient(#e2e8f0 1px, transparent 1px);
            background-size: 30px 30px;
            margin: 0; 
            padding: 0; 
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
            position: relative;
        }
        
        /* Floating abstract shapes for uniqueness */
        .bg-shape {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            z-index: 0;
            opacity: 0.6;
            animation: floatShape 20s infinite alternate;
        }
        
        @keyframes floatShape {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(30px, -50px) scale(1.1); }
        }

        .shape-1 { background: #bfdbfe; width: 450px; height: 450px; top: -150px; left: -100px; }
        .shape-2 { background: #ddd6fe; width: 350px; height: 350px; bottom: -50px; right: -50px; animation-delay: -10s; }
        
        /* Header Fix - Detach from container and absolute at top */
        header {
            position: absolute !important;
            top: 0;
            left: 0;
            width: 100%;
            background: transparent !important;
            border-bottom: none !important;
            box-shadow: none !important;
            padding: 30px 0 !important;
            z-index: 10;
        }
        
        main {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            z-index: 5;
        }
        
        .auth-container { 
            width: 100%;
            max-width: 440px; 
            padding: 50px 40px; 
            /* Premium glassmorphism overlay */
            background: rgba(255, 255, 255, 0.95); 
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 25px 50px -12px rgba(26,60,135,0.15), 0 0 0 1px rgba(255,255,255,0.7); 
            border-radius: 24px; 
            position: relative;
            overflow: hidden;
            transform: translateY(20px); /* Just pushing it slightly down from the visual center to balance logo */
        }

        /* Top accent line */
        .auth-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 6px;
            background: linear-gradient(90deg, #1a3c87, #4facfe, #00f2fe);
        }

        .auth-container h2 { 
            text-align: center; 
            margin-bottom: 8px; 
            color: #0f172a; 
            font-size: 30px; 
            font-weight: 800; 
            letter-spacing: -0.5px;
        }
        
        .auth-subtitle { 
            text-align: center; 
            color: #64748b; 
            font-size: 15px; 
            margin-bottom: 35px; 
            font-weight: 500;
        }
        
        .auth-form .form-group { margin-bottom: 22px; }
        .auth-form label { 
            display: block; 
            margin-bottom: 8px; 
            font-weight: 600; 
            color: #334155; 
            font-size: 14px; 
        }
        
        .auth-form input { 
            width: 100%; 
            padding: 14px 16px; 
            border: 1.5px solid #e2e8f0; 
            border-radius: 10px; 
            font-family: inherit; 
            font-size: 15px; 
            transition: all 0.3s ease; 
            background: #fff;
            color: #1e293b;
            box-sizing: border-box;
        }
        
        .auth-form input::placeholder { color: #94a3b8; }
        .auth-form input:focus { 
            border-color: #1a3c87; 
            outline: none; 
            box-shadow: 0 0 0 4px rgba(26,60,135,0.1); 
        }
        
        .auth-form button { 
            width: 100%; 
            padding: 15px; 
            background: #1a3c87; 
            color: #fff; 
            border: none; 
            border-radius: 10px; 
            cursor: pointer; 
            margin-top: 10px; 
            font-weight: 700; 
            font-size: 16px; 
            transition: all 0.3s ease; 
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }
        
        .auth-form button:hover { 
            background: #122c66; 
            transform: translateY(-2px); 
            box-shadow: 0 10px 25px -5px rgba(26,60,135,0.3); 
        }
        
        .auth-form button:active { transform: translateY(0); }
        
        .auth-toggle { 
            text-align: center; 
            margin-top: 30px; 
            cursor: pointer; 
            color: #1a3c87; 
            font-weight: 600; 
            font-size: 15px; 
            transition: all 0.2s; 
        }
        
        .auth-toggle:hover { color: #0f172a; text-decoration: underline; }
        .hidden { display: none; }
        
        .back-link { 
            position: absolute; 
            top: 30px; 
            left: 30px; 
            display: flex;
            align-items: center;
            gap: 8px;
            color: #64748b; 
            text-decoration: none; 
            font-size: 14px; 
            font-weight: 600;
            transition: all 0.2s; 
            z-index: 10;
        }
        .back-link:hover { color: #0f172a; transform: translateX(-3px); }
        
        /* Mobile responsive adjustments */
        @media (max-width: 640px) {
            .auth-container { padding: 40px 25px; margin-top: 80px; }
            .back-link { top: 20px; left: 20px; }
            .shape-1, .shape-2 { display: none; } /* Remove shapes on mobile for performance */
        }
    </style>
</head>
<body>
    <div class="bg-shape shape-1"></div>
    <div class="bg-shape shape-2"></div>
    
    <header>
        <div class="container" style="display:flex; justify-content:center;">
             <a href="index.html">
                 <img src="assets/header-logo.png" alt="Navabharath Technologies" width="180">
             </a>
        </div>
    </header>
    
    <main>
        <div class="auth-container">
            <a href="careers.html" class="back-link"><i class="fas fa-arrow-left"></i> Back</a>
            
            <div id="login-view">
                <h2>Sign In</h2>
                <p class="auth-subtitle">Start your career growth with us</p>
                <form class="auth-form" id="loginForm">
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" id="login-email" placeholder="Enter your email" required>
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="login-password" placeholder="Enter your password" required>
                    </div>
                    <button type="submit">Sign In <i class="fas fa-sign-in-alt"></i></button>
                </form>
                <div class="auth-toggle" id="to-signup">Don't have an account? Sign Up</div>
            </div>

            <div id="signup-view" class="hidden">
                <h2>Create Account</h2>
                <p class="auth-subtitle">Begin your journey with us today</p>
                <form class="auth-form" id="signupForm">
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" id="signup-name" placeholder="Enter your name" required>
                    </div>
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" id="signup-email" placeholder="Enter your email" required>
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="signup-password" placeholder="Create a password" required>
                    </div>
                    <button type="submit">Create Account <i class="fas fa-user-plus"></i></button>
                </form>
                <div class="auth-toggle" id="to-login">Already have an account? Sign In</div>
            </div>
        </div>
    </main>

    <script>
        const API        = 'https://company-website-backend-91ia.onrender.com/api';
        const loginView  = document.getElementById('login-view');
        const signupView = document.getElementById('signup-view');

        // ── Tab toggle with fade ────────────────────────────────
        document.getElementById('to-signup').addEventListener('click', () => {
            loginView.style.opacity = 0;
            setTimeout(() => {
                loginView.classList.add('hidden');
                signupView.classList.remove('hidden');
                signupView.style.opacity = 0;
                setTimeout(() => { signupView.style.opacity = 1; signupView.style.transition = 'opacity 0.3s ease'; }, 50);
            }, 300);
            loginView.style.transition = 'opacity 0.3s ease';
            hideError();
        });

        document.getElementById('to-login').addEventListener('click', () => {
            signupView.style.opacity = 0;
            setTimeout(() => {
                signupView.classList.add('hidden');
                loginView.classList.remove('hidden');
                loginView.style.opacity = 0;
                setTimeout(() => { loginView.style.opacity = 1; loginView.style.transition = 'opacity 0.3s ease'; }, 50);
            }, 300);
            signupView.style.transition = 'opacity 0.3s ease';
            hideError();
        });

        // ── Inline error banner ─────────────────────────────────
        function showError(msg) {
            let err = document.getElementById('auth-error');
            if (!err) {
                err = document.createElement('div');
                err.id = 'auth-error';
                err.style.cssText = 'background:#fef2f2;border:1px solid #fecaca;color:#dc2626;padding:12px 16px;border-radius:10px;font-size:14px;margin-bottom:16px;text-align:center;animation:fadeIn .3s ease;';
                document.querySelector('.auth-container').insertBefore(err, document.querySelector('.auth-container').firstChild.nextSibling);
            }
            err.textContent = msg;
            err.style.display = 'block';
        }
        function hideError() {
            const err = document.getElementById('auth-error');
            if (err) err.style.display = 'none';
        }

        // ── Store auth tokens ───────────────────────────────────
        function storeAuth(data) {
            localStorage.setItem('accessToken',  data.accessToken);
            localStorage.setItem('refreshToken', data.refreshToken);
            localStorage.setItem('candidate',    JSON.stringify(data.candidate));
            localStorage.setItem('loggedInUser', data.candidate.email); // backwards compat
        }

        // ── Redirect after auth ─────────────────────────────────
        function redirect() {
            const intendedJobId = localStorage.getItem('intendedJobId');
            if (intendedJobId) {
                window.location.href = 'openings.html?jobId=' + intendedJobId;
            } else {
                window.location.href = 'openings.html';
            }
        }

        // ── Login ───────────────────────────────────────────────
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            hideError();
            const btn = e.target.querySelector('button');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Signing in...';

            try {
                const res  = await fetch(`${API}/auth/login`, {
                    method:  'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body:    JSON.stringify({
                        email:    document.getElementById('login-email').value.trim(),
                        password: document.getElementById('login-password').value
                    })
                });
                const data = await res.json();
                if (!res.ok) {
                    showError(data.error || 'Login failed. Please check your credentials.');
                } else {
                    storeAuth(data);
                    redirect();
                }
            } catch {
                showError('Network error. Please check your connection and try again.');
            } finally {
                btn.disabled = false;
                btn.innerHTML = 'Sign In <i class="fas fa-sign-in-alt"></i>';
            }
        });

        // ── Signup ──────────────────────────────────────────────
        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            hideError();
            const btn = e.target.querySelector('button');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Creating account...';

            try {
                const res  = await fetch(`${API}/auth/register`, {
                    method:  'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body:    JSON.stringify({
                        name:     document.getElementById('signup-name').value.trim(),
                        email:    document.getElementById('signup-email').value.trim(),
                        password: document.getElementById('signup-password').value
                    })
                });
                const data = await res.json();
                if (!res.ok) {
                    showError(data.error || 'Registration failed. Please try again.');
                } else {
                    storeAuth(data);
                    redirect();
                }
            } catch {
                showError('Network error. Please check your connection and try again.');
            } finally {
                btn.disabled = false;
                btn.innerHTML = 'Create Account <i class="fas fa-user-plus"></i>';
            }
        });
    </script>
</body>
</html>
